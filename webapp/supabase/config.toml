project_id = "cleanla"

[api]
enabled = true
# Offset from default 54321 → 64321 so this project can coexist with other
# local supabase projects (e.g. the adn project at 54xxx) on the same machine.
port = 64321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 64322
shadow_port = 64320
major_version = 15

[studio]
enabled = true
port = 64323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]

[storage]
enabled = true
file_size_limit = "50MiB"

# Disable optional services not needed for the validation MVP, AND/OR move
# them to 64xxx ports so they coexist with other local supabase projects.

[analytics]
enabled = false

[inbucket]
enabled = false

[edge_runtime]
enabled = false

[db.pooler]
enabled = false

